<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小红书</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header" id="header">
        <div class="header-content">
            <div class="logo">小红书</div>
            <div class="search-box">
                <input type="text" placeholder="搜索感兴趣的内容">
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content" id="mainContent">
        <!-- 首页 Feed -->
        <section class="page feed-page active" id="feedPage">
            <div class="waterfall-container" id="waterfallContainer">
                <!-- 动态生成的卡片 -->
            </div>
        </section>

        <!-- 发布页面 -->
        <section class="page publish-page" id="publishPage">
            <div class="publish-container">
                <h2>发布笔记</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-placeholder">
                        <span class="plus-icon">+</span>
                        <p>点击上传图片</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" multiple hidden>
                </div>
                <div class="preview-area" id="previewArea"></div>
                <div class="form-group">
                    <input type="text" id="noteTitle" placeholder="填写标题会有更多赞哦~">
                </div>
                <div class="form-group">
                    <textarea id="noteContent" placeholder="添加正文"></textarea>
                </div>
                <button class="publish-btn" id="publishBtn">发布笔记</button>
            </div>
        </section>

        <!-- 我的页面 -->
        <section class="page profile-page" id="profilePage">
            <div class="profile-header">
                <div class="profile-bg"></div>
                <div class="profile-info">
                    <div class="avatar-section">
                        <img src="https://picsum.photos/seed/user1/100/100" alt="头像" class="avatar" id="userAvatar">
                        <div class="user-details">
                            <h3 class="nickname" id="userNickname">未登录</h3>
                            <p class="user-id" id="userId">点击登录</p>
                        </div>
                    </div>
                    <div class="stats-section">
                        <div class="stat-item" id="followingBtn">
                            <span class="stat-num" id="followingCount">0</span>
                            <span class="stat-label">关注</span>
                        </div>
                        <div class="stat-item" id="followersBtn">
                            <span class="stat-num" id="followersCount">0</span>
                            <span class="stat-label">粉丝</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="likesCount">0</span>
                            <span class="stat-label">获赞</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="profile-tabs">
                <div class="tab-item active" data-tab="works">作品</div>
                <div class="tab-item" data-tab="liked">已点赞</div>
                <div class="tab-item" data-tab="collected">收藏</div>
            </div>
            <div class="profile-content">
                <div class="tab-content active" id="worksTab">
                    <div class="grid-container" id="worksGrid"></div>
                </div>
                <div class="tab-content" id="likedTab">
                    <div class="grid-container" id="likedGrid"></div>
                </div>
                <div class="tab-content" id="collectedTab">
                    <div class="grid-container" id="collectedGrid"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-item active" data-page="feed">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">首页</span>
        </div>
        <div class="nav-item nav-publish" data-page="publish">
            <span class="nav-icon">+</span>
        </div>
        <div class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-text">我的</span>
        </div>
    </nav>

    <!-- 登录弹窗 -->
    <div class="modal login-modal" id="loginModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>登录</h3>
                <span class="close-btn" id="closeLogin">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码">
                </div>
                <button class="login-btn" id="loginBtn">登录</button>
                <p class="login-tip">默认账号: admin / 123456</p>
            </div>
        </div>
    </div>

    <!-- 关注/粉丝列表弹窗 -->
    <div class="modal user-list-modal" id="userListModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userListTitle">关注列表</h3>
                <span class="close-btn" id="closeUserList">&times;</span>
            </div>
            <div class="modal-body">
                <div class="user-list" id="userList"></div>
            </div>
        </div>
    </div>

    <!-- 评论弹窗 -->
    <div class="modal comment-modal" id="commentModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>评论</h3>
                <span class="close-btn" id="closeComment">&times;</span>
            </div>
            <div class="modal-body">
                <div class="comments-list" id="commentsList"></div>
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="说点什么...">
                    <button id="sendComment">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="modal share-modal" id="shareModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>分享到</h3>
                <span class="close-btn" id="closeShare">&times;</span>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <div class="share-option" data-type="friend">
                        <span class="share-icon">💬</span>
                        <span>分享给好友</span>
                    </div>
                    <div class="share-option" data-type="copy">
                        <span class="share-icon">📋</span>
                        <span>复制链接</span>
                    </div>
                    <div class="share-option" data-type="wechat">
                        <span class="share-icon">💚</span>
                        <span>微信</span>
                    </div>
                    <div class="share-option" data-type="weibo">
                        <span class="share-icon">👁</span>
                        <span>微博</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部分享操作栏 -->
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-overlay"></div>
        <div class="sheet-content">
            <div class="sheet-title">分享到</div>
            <div class="sheet-options">
                <div class="sheet-option" data-type="friend">
                    <span class="option-icon">💬</span>
                    <span>分享给好友</span>
                </div>
                <div class="sheet-option" data-type="copy">
                    <span class="option-icon">📋</span>
                    <span>复制链接</span>
                </div>
                <div class="sheet-option" data-type="wechat">
                    <span class="option-icon">💚</span>
                    <span>微信</span>
                </div>
                <div class="sheet-option" data-type="weibo">
                    <span class="option-icon">👁</span>
                    <span>微博</span>
                </div>
            </div>
            <div class="sheet-cancel" id="cancelShare">取消</div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
